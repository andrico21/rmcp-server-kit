name: CI

on:
  push:
    branches: [main]
    # Also run on semver-shaped tags so the Release workflow (which
    # triggers on `workflow_run: [CI]`) fires for tag pushes. Without
    # this, releasing a new version requires manually re-running the
    # CI workflow on the merge commit so Release can find the tag.
    # See release.yml header comment for the full ritual.
    tags: ['[0-9]+.[0-9]+.[0-9]+*']
  pull_request:
    branches: [main]
  schedule:
    # Nightly at 03:17 UTC for cargo-mutants (advisory).
    - cron: "17 3 * * *"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt
      - run: cargo +nightly fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2.9.1
      - run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: Test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Remove Homebrew rust shim (macOS arm64 PATH precedence)
        if: runner.os == 'macOS'
        run: |
          brew uninstall --ignore-dependencies rustup rust 2>/dev/null || true
          rm -f /opt/homebrew/bin/cargo /opt/homebrew/bin/rustc /opt/homebrew/bin/rustup /opt/homebrew/bin/rustup-init
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2.9.1
      - run: cargo test --all-features
      - name: Doctests [H-T4]
        run: cargo test --doc --all-features

  features-matrix:
    name: Feature matrix (${{ matrix.features }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        features:
          - ""
          - "--no-default-features"
          - "--features oauth"
          - "--features metrics"
          - "--all-features"
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2.9.1
      - name: Build (${{ matrix.features }})
        run: cargo build ${{ matrix.features }}
      - name: Test (${{ matrix.features }})
        run: cargo test ${{ matrix.features }}

  # Re-enabled after 1.6.0's H3 RFC-3339 break shipped. The intentional
  # break is now the published baseline on crates.io, so cargo-semver-checks
  # compares HEAD against that baseline going forward. Re-enable was deferred
  # to the first additive release post-1.6.0 (1.7.4 added the `cancel` module
  # and `McpxError::RetryableTimeout` variant — both purely additive).
  semver-checks:
    name: cargo-semver-checks
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2.9.1
      - name: Install cargo-semver-checks
        run: cargo install cargo-semver-checks --locked
      - name: Check release semver
        run: cargo semver-checks check-release

  publish-dryrun:
    name: cargo publish --dry-run
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2.9.1
      - name: Verify the crate is publishable
        run: cargo publish --dry-run --all-features

  bench-thresholds:
    name: Benchmark thresholds
    runs-on: ubuntu-latest
    # Allowed-to-fail for first ship of 0.11; promote to required after
    # one green run on main (per plan H-T4 / shared bench tooling).
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2.9.1
      - name: Run rbac_redaction bench
        run: cargo bench --bench rbac_redaction
      - name: Assert redact_arg < 10µs
        run: bash scripts/check-bench-threshold.sh bench_redact_arg 10000
      - name: Run hook_latency bench
        run: cargo bench --bench hook_latency
      - name: Assert hook overhead <= 2us
        run: bash scripts/check-bench-overhead.sh hook_latency_hooked hook_latency_bare 2000

  docs:
    name: Rustdoc
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: "-D warnings --cfg docsrs"
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2.9.1
      - run: cargo +nightly doc --no-deps --all-features
      - name: Verify SECURITY.md documents mTLS revocation [H-S4]
        run: |
          set -e
          # Section header is still required.
          grep -q "Certificate revocation" SECURITY.md
          # Since 1.2.0 we DO implement CDP-driven CRL checking. Assert that
          # SECURITY.md describes the current behaviour rather than the old
          # "does NOT validate CRL/OCSP" disclaimer.
          grep -qE "CDP[- ]driven CRL" SECURITY.md
          grep -q "crl_deny_on_unavailable" SECURITY.md
          # OCSP is still explicitly not implemented; make sure that limitation
          # remains documented so operators don't assume it works.
          grep -qE "OCSP is (\*\*)?not(\*\*)? implemented" SECURITY.md
          # Defence-in-depth guidance must remain.
          grep -qE "(short-lived|24h|24 hour)" SECURITY.md
          grep -qE "(cert-manager|Vault PKI|Smallstep)" docs/GUIDE.md

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: EmbarkStudios/cargo-deny-action@v2

  audit:
    name: cargo-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2.9.1
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Generate Cargo.lock (library crate; lockfile is .gitignored)
        run: cargo generate-lockfile
      - name: Run cargo audit
        run: cargo audit

  msrv:
    name: MSRV (1.95.0)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.95.0
      - uses: Swatinem/rust-cache@v2.9.1
      - run: cargo build --all-features

  memory-bounds:
    name: Memory bounds (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2.9.1
      - name: Run BoundedKeyedLimiter memory regression test
        run: cargo test --release --all-features --test limiter_memory -- --ignored --nocapture

  docs-validate:
    name: Validate docs (citations + links)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2.9.1
      - name: Verify ARCHITECTURE.md citations resolve
        run: cargo test --all-features --test docs_citations
      - name: Check Markdown links (offline)
        uses: lycheeverse/lychee-action@v2
        with:
          args: --offline --no-progress README.md docs/*.md
          fail: true

  # ---------------------------------------------------------------------------
  # Supply-chain advisory jobs (Phase 2 / 1.1.0).
  #
  # All three are `continue-on-error: true` so they surface signal without
  # gating merges while we tune their configurations. Promote any of them
  # to required after a stable green run.
  # ---------------------------------------------------------------------------

  vet:
    name: cargo-vet (advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2.9.1
      - name: Install cargo-vet
        run: cargo install cargo-vet --locked
      - name: Generate Cargo.lock (library crate; lockfile is .gitignored)
        run: cargo generate-lockfile
      - name: Run cargo vet
        # A full exemption baseline is committed under supply-chain/, so
        # vet passes deterministically for the pinned dependency set.
        # Dependency bumps will fail this job until exemptions are
        # regenerated (`cargo vet regenerate exemptions`) or the new
        # version is audited. Promote to required after a green run.
        run: cargo vet --locked

  taplo:
    name: TOML format (taplo)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2.9.1
      - name: Install taplo
        run: cargo install taplo-cli --locked
      - name: Check TOML formatting
        # Scoping (include/exclude) lives in .taplo.toml at the repo root.
        run: taplo fmt --check

  machete:
    name: cargo-machete (unused deps)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2.9.1
      - name: Install cargo-machete
        run: cargo install cargo-machete --locked
      - name: Detect unused dependencies
        run: cargo machete

  mutants:
    name: cargo-mutants (nightly mutation tests)
    runs-on: ubuntu-latest
    # Schedule-only / manual: mutation testing is expensive and is not run
    # on every PR. Triggered nightly via the `schedule` event below or by
    # manual dispatch.
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    continue-on-error: true
    # Hard-cap each shard well below GitHub's 6h ceiling so it terminates
    # gracefully (allowing `continue-on-error` to take effect) instead of
    # being SIGKILLed and marking the entire workflow run as failed.
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        # NOTE: cargo-mutants shards are ZERO-indexed: valid values for
        # `--shard k/4` are 0..3. Passing 4/4 silently selects an empty
        # shard instead of erroring.
        shard: [0, 1, 2, 3]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2.9.1
      - name: Install cargo-mutants
        run: cargo install cargo-mutants --locked
      - name: Run cargo mutants on security-critical modules (shard ${{ matrix.shard }}/4)
        # Scope to the security-critical modules where mutation testing is
        # most informative. `oauth.rs` was previously included but its
        # ~1700 lines dominated runtime (the suite only reached ~30% of
        # mutants before the wall-clock cap) and most of its mutants are
        # config-builder boilerplate.
        # The 1.8.1 review fixes added security-critical logic in
        # transport.rs (concurrent TLS acceptor), ssrf.rs (IPv6 transition
        # prefixes), and mtls_revocation.rs (semaphore eviction, timestamp
        # clamp), so those files joined the scope; to keep each nightly
        # job within the wall-clock budget the mutant list is now split
        # deterministically across 4 parallel shards (`--shard K/4`).
        # Wrap in `timeout` so we exit 0 even if cargo-mutants itself
        # blows past the wall-clock budget (GitHub's job-level
        # `timeout-minutes` SIGKILLs and bypasses `|| true`).
        # `--timeout 360`: the per-test-run cap must exceed the FULL
        # suite's runtime because the per-shard baseline (and any
        # surviving mutant) runs the whole suite; the suite grew past the
        # old 180s budget (~210s as of 1.8.2), which made a shard's
        # baseline time out and silently skip all of its mutants.
        run: timeout --preserve-status 170m cargo mutants --no-shuffle --timeout 360 -j 2 --shard ${{ matrix.shard }}/4 -f src/rbac.rs -f src/auth.rs -f src/transport.rs -f src/ssrf.rs -f src/mtls_revocation.rs || true


