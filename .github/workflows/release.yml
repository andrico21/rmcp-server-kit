name: Release

on:
  push:
    tags:
      # Glob (not regex) - GitHub Actions tag filters use fnmatch-style globs.
      # Matches semver-shaped tags like "0.10.0", "1.2.3-rc1", etc.
      # The "Verify tag matches Cargo.toml version" step below is the real
      # safety gate; this filter just keeps unrelated tags from triggering.
      - "*.*.*"

jobs:
  publish:
    name: cargo publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2.9.1

      - name: Verify tag matches Cargo.toml version
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          CRATE_VERSION=$(cargo metadata --no-deps --format-version 1 \
            | jq -r '.packages[] | select(.name == "rmcp-server-kit") | .version')
          if [ "$TAG" != "$CRATE_VERSION" ]; then
            echo "::error::git tag $TAG does not match Cargo.toml version $CRATE_VERSION"
            exit 1
          fi

      - name: Extract release notes for this version
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          # Extract everything between "## [TAG]" and the next "## [" header.
          # Strips the version header line itself; release page already shows the version as the title.
          awk -v ver="$TAG" '
            $0 ~ "^## \\[" ver "\\]" { found=1; next }
            found && /^## \[/        { exit }
            found                    { print }
          ' CHANGELOG.md > RELEASE_NOTES.md
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "::error::No CHANGELOG.md section found for version $TAG"
            exit 1
          fi
          echo "----- RELEASE_NOTES.md -----"
          cat RELEASE_NOTES.md
          echo "----- end -----"

      - name: Dry-run publish
        run: cargo publish --dry-run --all-features

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --all-features

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          body_path: RELEASE_NOTES.md
